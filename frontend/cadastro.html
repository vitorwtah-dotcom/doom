<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>

    <nav>
      <a href="index.html">Home</a>
      <a href="cadastro.html">Cadastro</a>
      <a href="alunos.html">Alunos</a>
      <a href="admin.html">ADM</a>
    </nav>

  </header>

  <div class="container">

    <div class="card">

      <h1>Cadastro de Aluno</h1>

      <form onsubmit="cadastrarAluno(event)">

        <input
          type="text"
          id="nome"
          placeholder="Nome"
        >

        <input
          type="number"
          id="idade"
          placeholder="Idade"
        >

        <input 
          type="number"
          id="telefone"
          placeholder="Telefone"
        >
        
        <select id="nivel">
          <option>Iniciante</option>
          <option>Intermediário</option>
          <option>Avançado</option>
        </select>

        <select id="horario">
          <option>08:00</option>
          <option>10:00</option>
          <option>14:00</option>
          <option>18:00</option>
        </select>

        <button type="submit">
          Cadastrar
        </button>

      </form>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
